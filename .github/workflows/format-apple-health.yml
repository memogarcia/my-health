name: Format Apple Health branch

on:
  push:
    branches: [feat/apple-health-sync-foundation]

permissions:
  contents: write

jobs:
  rustfmt:
    if: ${{ !contains(github.event.head_commit.message, '[rustfmt]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/apple-health-sync-foundation
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          git commit -m "Apply rustfmt [rustfmt]"
          git push origin HEAD:feat/apple-health-sync-foundation

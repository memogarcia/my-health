name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  clean-checkout:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run lint:rust
      - run: npm run tauri:build
